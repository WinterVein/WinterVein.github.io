name: Build and deploy photo gallery

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Cache gallery metadata
        uses: actions/cache@v4
        with:
          path: _data/gallery
          key: gallery-${{ hashFiles('images/fulls/**') }}
          restore-keys: gallery-

      - name: Generate descriptions.json from GEN.PLZ
        run: |
          # Find all GEN.PLZ files in the repository
          GEN_FILES=$(find images -name "GEN.PLZ" -type f)
          
          for gen_file in $GEN_FILES; do
            # Get the directory containing GEN.PLZ
            dir=$(dirname "$gen_file")
            
            # Find all JPEG files in that directory
            jpeg_files=$(find "$dir" -maxdepth 1 -name "*.jpg" -o -name "*.jpeg" -o -name "*.JPG" -o -name "*.JPEG" | sed 's|.*/||')
            
            # Create descriptions.json with blank entries for all photos
            descriptions_json="{"
            first=true
            for jpeg in $jpeg_files; do
              if [ "$first" = true ]; then
                first=false
              else
                descriptions_json+=","
              fi
              descriptions_json+="\n  \"$jpeg\": \"\""
            done
            descriptions_json+="\n}"
            
            # Write descriptions.json
            echo "$descriptions_json" > "${dir}/descriptions.json"
            echo "Generated descriptions.json in $dir"
            
            # Delete GEN.PLZ
            rm "$gen_file"
            echo "Deleted GEN.PLZ from $dir"
          done

      - name: Generate thumbnails for new images
        run: node scripts/compress-images.mjs --thumbs-only

      - name: Scan images + build site
        run: npm run build

      - name: Save gallery metadata
        uses: actions/cache@v4
        with:
          path: _data/gallery
          key: gallery-${{ hashFiles('images/fulls/**') }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
